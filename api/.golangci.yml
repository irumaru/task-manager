version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - gocritic
    - misspell
    - nilerr
    - prealloc
    - revive
    - rowserrcheck
    - sqlclosecheck
    - unconvert
    - wrapcheck
  settings:
    wrapcheck:
      ignore-sigs:
        - .Errorf(
        - errors.New(
        - errors.Unwrap(
        - errors.Join(
        - .Wrap(
        - .Wrapf(
        - .WithMessage(
        - .WithMessagef(
        - .WithStack(
      ignore-package-globs:
        - task-manager/api/**
        - github.com/jackc/pgx/**
        - github.com/google/uuid
        - github.com/golang-jwt/**
        - encoding/json
        - net/http
    revive:
      rules:
        - name: exported
          disabled: true
        - name: package-comments
          disabled: true
  exclusions:
    paths:
      - internal/api
      - internal/repository

formatters:
  enable:
    - gofmt
  exclusions:
    paths:
      - internal/api
      - internal/repository
