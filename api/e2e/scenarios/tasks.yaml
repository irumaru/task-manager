desc: タスク CRUD
runners:
  req: http://localhost:8080
steps:
  # 事前準備: status と tag を作成
  setup_status:
    desc: タスク用ステータスを作成
    req:
      /statuses:
        post:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              name: "e2e-task-status"
              displayOrder: 1
    test: current.res.status == 200

  setup_tag:
    desc: タスク用タグを作成
    req:
      /tags:
        post:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              name: "e2e-task-tag"
    test: current.res.status == 200

  # タスク CRUD
  create_task:
    desc: POST /tasks - タスク作成（タグ付き）
    req:
      /tasks:
        post:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              title: "e2e-task"
              statusId: "{{ steps.setup_status.res.body.id }}"
              tagIds:
                - "{{ steps.setup_tag.res.body.id }}"
    test: current.res.status == 200 && current.res.body.title == "e2e-task" && len(current.res.body.tagIds) == 1

  list_tasks:
    desc: GET /tasks - タスク一覧取得
    req:
      /tasks:
        get:
          headers:
            Authorization: "Bearer {{ vars.token }}"
    test: current.res.status == 200 && len(current.res.body.items) >= 1

  get_task:
    desc: GET /tasks/{id} - タスク取得
    req:
      /tasks/{{ steps.create_task.res.body.id }}:
        get:
          headers:
            Authorization: "Bearer {{ vars.token }}"
    test: current.res.status == 200 && current.res.body.id == steps.create_task.res.body.id

  update_task:
    desc: PUT /tasks/{id} - タスク更新（全フィールド）
    req:
      /tasks/{{ steps.create_task.res.body.id }}:
        put:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              title: "e2e-task-updated"
              memo: null
              dueDate: null
              statusId: "{{ steps.setup_status.res.body.id }}"
              priorityId: null
              tagIds:
                - "{{ steps.setup_tag.res.body.id }}"
    test: current.res.status == 200 && current.res.body.title == "e2e-task-updated"

  update_task_clear_tags:
    desc: PUT /tasks/{id} - tagIds 空配列でタグ全削除
    req:
      /tasks/{{ steps.create_task.res.body.id }}:
        put:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              title: "e2e-task-updated"
              memo: null
              dueDate: null
              statusId: "{{ steps.setup_status.res.body.id }}"
              priorityId: null
              tagIds: []
    test: current.res.status == 200 && len(current.res.body.tagIds) == 0

  get_task_verify_clear:
    desc: GET /tasks/{id} - クリア後の DB 状態を確認
    req:
      /tasks/{{ steps.create_task.res.body.id }}:
        get:
          headers:
            Authorization: "Bearer {{ vars.token }}"
    test: current.res.status == 200 && current.res.body.memo == null && len(current.res.body.tagIds) == 0

  delete_task:
    desc: DELETE /tasks/{id} - タスク削除
    req:
      /tasks/{{ steps.create_task.res.body.id }}:
        delete:
          headers:
            Authorization: "Bearer {{ vars.token }}"
    test: current.res.status == 204
