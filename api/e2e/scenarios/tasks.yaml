desc: タスク CRUD
runners:
  req: http://localhost:8080
steps:
  # 事前準備: status と tag を作成
  setup_status:
    desc: タスク用ステータスを作成
    req:
      /statuses:
        post:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              name: "e2e-task-status"
              displayOrder: 1
    test: current.res.status == 200

  setup_tag:
    desc: タスク用タグを作成
    req:
      /tags:
        post:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              name: "e2e-task-tag"
    test: current.res.status == 200

  # タスク CRUD
  create_task:
    desc: POST /tasks - タスク作成（タグ付き）
    req:
      /tasks:
        post:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              title: "e2e-task"
              statusId: "{{ steps.setup_status.res.body.id }}"
              tagIds:
                - "{{ steps.setup_tag.res.body.id }}"
    test: current.res.status == 200 && current.res.body.title == "e2e-task" && len(current.res.body.tagIds) == 1

  list_tasks:
    desc: GET /tasks - タスク一覧取得
    req:
      /tasks:
        get:
          headers:
            Authorization: "Bearer {{ vars.token }}"
    test: current.res.status == 200 && len(current.res.body.items) >= 1

  get_task:
    desc: GET /tasks/{id} - タスク取得
    req:
      /tasks/{{ steps.create_task.res.body.id }}:
        get:
          headers:
            Authorization: "Bearer {{ vars.token }}"
    test: current.res.status == 200 && current.res.body.id == steps.create_task.res.body.id

  update_task:
    desc: PATCH /tasks/{id} - タスク更新
    req:
      /tasks/{{ steps.create_task.res.body.id }}:
        patch:
          headers:
            Authorization: "Bearer {{ vars.token }}"
          body:
            application/json:
              title: "e2e-task-updated"
    test: current.res.status == 200 && current.res.body.title == "e2e-task-updated"

  delete_task:
    desc: DELETE /tasks/{id} - タスク削除
    req:
      /tasks/{{ steps.create_task.res.body.id }}:
        delete:
          headers:
            Authorization: "Bearer {{ vars.token }}"
    test: current.res.status == 204
