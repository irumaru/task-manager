[tools]
go   = '1.26.1'
sqlc = '1.30.0'
atlas = '1.1.0'
node = '24.14.0'
pnpm = '10.32.1'

"go:github.com/ogen-go/ogen/cmd/ogen"  = '1.20.1'

[tasks."db:migrate"]
description = "データベースのマイグレーションを実行します。"
run = "docker compose exec -T db psql -U postgres -d taskmanager < schema.sql && docker compose exec -T db psql -U postgres -d taskmanager_template < schema.sql"

[tasks."db:migrations:create"]
description = "データベースのマイグレーションファイルを作成します。"
run = "atlas migrate diff --to file://schema.sql --dir file://migrator/migrations --dev-url \"postgres://postgres:example@127.0.0.1:5432/taskmanager_atlas_dev?sslmode=disable\""

[tasks."gen"]
description = "コード生成を実行します。"
depends = ['gen:go', 'gen:tsp']

[tasks."gen:go"]
description = "Goのコード生成を実行します。"
depends = ['gen:go:ogen', 'gen:go:sqlc']

[tasks."gen:go:ogen"]
description = 'ogenを使用してAPIコードを生成します。'
depends = ['gen:tsp']
run = "ogen --target ./api/internal/api/ -package api --clean ./spec/tsp-output/openapi.yaml"

[tasks."gen:go:sqlc"]
description = 'sqlcを使用してORMコードを生成します'
run = "sqlc generate -f ./api/sqlc.yaml"

[tasks."gen:tsp"]
description = "TypeSpecのコード生成を実行します。"
run = "cd spec && pnpm exec -- tsp compile ."

[tasks."clean"]
description = "生成されたコードを削除します。"
run = "rm -rf ./api/internal/api/* ./api/internal/repository/*"
