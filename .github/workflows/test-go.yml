name: test-go

on:
  pull_request:
    paths:
      - 'api/**'
      - '.mise.toml'
      - 'schemas.sql'
      - '.github/workflows/test-go.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Cache Go build and modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-test-${{ hashFiles('api/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-test-
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build with cache
        uses: docker/bake-action@v7
        with:
          files: docker-compose.yml
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
          load: true

      - name: Set environment variables
        run: |
          echo "JWT_SECRET=\"test-secret\"" > .env
          echo "GOOGLE_CLIENT_ID=\"test-google-client-id\"" >> .env
          echo "GOOGLE_CLIENT_SECRET=\"test-google-client-secret\"" >> .env
      - name: Docker Compose Up
        run: docker compose up -d --wait api
      - name: database initialize
        run: mise run db:migrate
      - name: go mod download
        run: cd api && go mod download

      - name: Run Tests
        run: cd api && go test -v ./...

      - name: Show Docker logs on failure
        if: failure()
        run: docker compose logs
