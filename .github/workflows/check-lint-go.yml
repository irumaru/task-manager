name: lint-go

on:
  pull_request:
    paths:
      - 'api/**'
      - '.mise.toml'
      - '.github/workflows/check-lint-go.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Install mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Cache Go build and modules
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
            ~/.cache/golangci-lint
          key: ${{ runner.os }}-go-lint-${{ hashFiles('api/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-lint-
      - name: go mod download
        run: cd api && go mod download
      - name: Run golangci-lint
        run: mise run lint
