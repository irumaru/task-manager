name: test-generated

on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup mise
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
          run_install: true
          cache: true
      - name: Setup db
        run: docker compose up -d db --wait

      - name: Clean generated files
        run: mise run clean
      - name: Generate files
        run: mise run gen
      - name: Create migrations file
        run: mise run db:migrations:create

      - name: Check for generated files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Generated files are out of date. Please run 'mise run gen' and commit the changes.";
            git --no-pager diff | head -n 100;
            exit 1;
          else
            echo "All generated files are up to date.";
          fi