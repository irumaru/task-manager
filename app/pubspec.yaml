name: task_manager
description: "シンプルで軽量なTodoアプリ"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 状態管理
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # 認証
  google_sign_in: ^7.2.0
  flutter_secure_storage: ^10.0.0

  # HTTP クライアント
  dio: ^5.9.0

  # WebSocket
  web_socket_channel: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # コード生成
  build_runner: ^2.12.2
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
